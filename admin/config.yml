backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
  - name: "catalog"
    label: "Products"
    files:
      - name: "products"
        label: "Product List"
        file: "products.json"
        description: "Add, edit, remove and reorder products. Each product links straight to its affiliate page."
        fields:
          - name: "products"
            label: "Products"
            label_singular: "Product"
            widget: "list"
            summary: "{{fields.name}}  —  {{fields.category}}"
            fields:
              - { name: "name", label: "Product name", widget: "string" }
              - { name: "image", label: "Product photo", widget: "image", required: false, hint: "Upload a photo, or paste an image URL." }
              - { name: "link", label: "Affiliate link", widget: "string", hint: "Where the card sends people, e.g. your Flipkart/Amazon affiliate URL" }
              - name: "category"
                label: "Category"
                widget: "select"
                options:
                  - "Kitchen Gadgets"
                  - "Home Gadgets"
                  - "Fashion Accessories"
                  - "Smartphone Accessories"
                create: true
                hint: "Pick one, or type a new category — tabs build automatically."
